<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibrant Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff0080,#7928ca,#00c6ff);
    }

    .calculator{
        width:320px;
        padding:20px;
        border-radius:20px;
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(10px);
        box-shadow:0 8px 25px rgba(0,0,0,0.3);
    }

    #display{
        width:100%;
        height:70px;
        border:none;
        border-radius:12px;
        margin-bottom:15px;
        font-size:28px;
        text-align:right;
        padding:10px;
        background:#ffffff;
        color:#333;
        font-weight:bold;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
    }

    button{
        height:60px;
        border:none;
        border-radius:12px;
        font-size:22px;
        font-weight:bold;
        cursor:pointer;
        transition:0.2s;
        color:white;
    }

    button:hover{
        transform:scale(1.08);
    }

    .num{
        background:linear-gradient(45deg,#00c6ff,#0072ff);
    }

    .operator{
        background:linear-gradient(45deg,#ff512f,#dd2476);
    }

    .equal{
        background:linear-gradient(45deg,#00b09b,#96c93d);
    }

    .clear{
        background:linear-gradient(45deg,#ff416c,#ff4b2b);
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()" rowspan="2">=</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>

        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="clear" onclick="deleteLast()">⌫</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function append(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function deleteLast(){
        display.value = display.value.slice(0,-1);
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        }
        catch{
            display.value = "Error";
        }
    }
</script>

</body>
</html>
